<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Lin Jie</title>
  <meta http-equiv="refresh" content="4; url=/" />
  <style>
    :root {
      --ink: #17212b;
      --muted: #52606d;
      --card: rgba(255, 251, 245, 0.92);
      --line: rgba(23, 33, 43, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(209, 111, 75, 0.14), transparent 24%),
        radial-gradient(circle at top left, rgba(21, 106, 115, 0.12), transparent 28%),
        linear-gradient(180deg, #f8f1e7 0%, #f3ece2 100%);
    }
    .card {
      width: min(100%, 560px);
      padding: 32px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: 0 18px 45px rgba(34, 41, 47, 0.09);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    a {
      display: inline-flex;
      margin-top: 20px;
      color: white;
      background: linear-gradient(135deg, #165f67 0%, #0e4e55 100%);
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Page not found</h1>
    <p>This page does not exist, or the URL has changed. You will be redirected to the portfolio homepage shortly.</p>
    <a href="/">Back to homepage</a>
  </main>
</body>
</html>
